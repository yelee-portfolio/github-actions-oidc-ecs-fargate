name: Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: secure-ecs-oidc-app
  ECS_CLUSTER: secure-ecs-oidc-cluster
  ECS_SERVICE: secure-ecs-oidc-service
  TASK_DEFINITION_FAMILY: secure-ecs-oidc-task
  CONTAINER_NAME: app
  APP_SECRET_ID: secure-ecs-oidc/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify deploy role cannot read application secret
        run: |
          if aws secretsmanager get-secret-value --secret-id "$APP_SECRET_ID" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "ERROR: Deploy role unexpectedly read the application secret."
            exit 1
          else
            echo "PASS: Deploy role is denied access to the application secret."
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app
          chmod +x gradlew
          ./gradlew clean bootJar

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create updated task definition
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          GIT_SHA: ${{ github.sha }}
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_DEFINITION_FAMILY \
            --query taskDefinition \
            --output json > current-task-definition.json

          jq \
            --arg image "$IMAGE_URI" \
            --arg git_sha "$GIT_SHA" \
            --arg container_name "$CONTAINER_NAME" \
            '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy,
              .deregisteredAt,
              .enableFaultInjection
            )
            | .containerDefinitions |= map(
                if .name == $container_name then
                  .image = $image
                  | .environment |= map(
                      if .name == "APP_VERSION" then
                        .value = $git_sha
                      else
                        .
                      end
                    )
                else
                  .
                end
              )
            ' current-task-definition.json > task-definition.json

      - name: Register task definition
        id: register-task-definition
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task-definition-arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.register-task-definition.outputs.task-definition-arn }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
